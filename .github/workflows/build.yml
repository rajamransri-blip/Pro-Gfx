name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.0"

      # 1. Khali repo mein Android aur baki files banayega
      - name: Generate Flutter Boilerplate
        run: flutter create --project-name gaming_tool --org com.raaz.gaming .

      # 🛠️ AAKHRI FIX: Shizuku ko API 24 chahiye. Ye step automatically app ka minSdk 24 kar dega!
      - name: Fix minSdkVersion for Shizuku (API 24)
        run: sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/g' android/app/build.gradle

      # 2. Ye Gradle mein bina error ke Shizuku API dal dega
      - name: Inject Shizuku API into build.gradle
        run: |
          echo "dependencies {" >> android/app/build.gradle
          echo "    implementation 'dev.rikka.shizuku:api:13.1.5'" >> android/app/build.gradle
          echo "    implementation 'dev.rikka.shizuku:provider:13.1.5'" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle

      # 3. Ye AndroidManifest mein zaroori permissions auto-inject karega
      - name: Inject Permissions into AndroidManifest.xml
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="moe.shizuku.manager.permission.API_V23" />' android/app/src/main/AndroidManifest.xml

      # 4. Ye aapke banaye huye Kotlin file ko Android folder ke andar sahi jagah chipka dega
      - name: Copy Custom MainActivity
        run: cp MainActivity_custom.kt android/app/src/main/kotlin/com/raaz/gaming/MainActivity.kt

      # 5. Build Final Release APK!
      - name: Install Dependencies & Build
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gamer-Pro-App
          path: build/app/outputs/flutter-apk/app-release.apk
