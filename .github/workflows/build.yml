name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.0"

      # 1. Boilerplate generate karega
      - name: Generate Flutter Boilerplate
        run: flutter create --project-name gaming_tool --org com.raaz.gaming .

      # 2. Shizuku API inject
      - name: Inject Shizuku API into build.gradle
        run: |
          echo "dependencies {" >> android/app/build.gradle
          echo "    implementation 'dev.rikka.shizuku:api:12.1.0'" >> android/app/build.gradle
          echo "    implementation 'dev.rikka.shizuku:provider:12.1.0'" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle

      # 🛠️ 3. YAHAN FIX HAI: Custom MainActivity ko bilkul sahi folder mein bheja ja raha hai
      - name: Copy Custom MainActivity
        run: |
          mkdir -p android/app/src/main/kotlin/com/raaz/gaming/gaming_tool/
          cp MainActivity_custom.kt android/app/src/main/kotlin/com/raaz/gaming/gaming_tool/MainActivity.kt

      # 4. Final Build!
      - name: Install Dependencies & Build
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gamer-Pro-App
          path: build/app/outputs/flutter-apk/app-release.apk
